name: ALignTrack
description: "Professional Department Monitoring App for Orthodontics."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  permission_handler: ^11.3.1
  cupertino_icons: ^1.0.8

  # --- Firebase Services ---
  firebase_core: ^3.10.0
  firebase_auth: ^5.4.0
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.4.0

  # --- Media & Files ---
  image_picker: ^1.1.2 
  file_picker: ^8.1.0

  # --- Reporting & Documents ---
  pdf: ^3.11.1
  printing: ^5.14.3
  path_provider: ^2.1.3
  open_filex: ^4.5.0

  # --- Notifications & Reminders ---
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # --- Utilities ---
  intl: ^0.20.0 

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # ✅ ADD THIS
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/logo1.png
    - assets/logo2.png
    - assets/app_icon.png   # ✅ ADD THIS

flutter_icons:
  android: true
  ios: true

  image_path: "assets/app_icon.png"

  adaptive_icon_background: "#F1F8E9"
  adaptive_icon_foreground: "assets/app_icon.png"